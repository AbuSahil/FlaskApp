<!DOCTYPE html>
<html lang="en">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Users</title>  
</head>
<body>  
   <h1><a href="/login">Add new User</a></h1>
     {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
    <h1>Registered Users</h1>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
                                
                <button type="button" onclick="location.href='/{{ user.id }}/edit'">Edit</button>
                <form method="POST" action="{{ url_for('delete', id=user.id) }}" style="display:inline;">
                       
                    <button type="submit" onclick="return confirm('আপুনি কি নিশ্চিত?')">Delete</button>
                </form>
                <button type="button" onclick="location.href='/{{ user.id }}/show'">Show</button>
            </td>
        </tr>
        {% endfor %}
    </table>
</html>
