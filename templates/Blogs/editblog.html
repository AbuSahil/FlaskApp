<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Blog Post</title>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
    <h1>Update Blog Post</h1>
    <form method="POST" action="{{ url_for('edit_blog', blog_id=blog.id) }}">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" value="{{ blog.title }}" required><br><br>
        <label for="content">Content:</label><br>
        <textarea id="content" name="content" rows="10" cols="50" required>{{ blog.content }}</textarea><br><br>
        <input type="submit" value="Submit">       
          
    </form>
    <a href="{{ url_for('blogs') }}">Back to Blogs</a>
</body>
</html>
